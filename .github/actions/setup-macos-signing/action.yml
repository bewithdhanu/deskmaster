name: Setup macOS signing
description: Import Apple Developer ID certificate into a temporary keychain for CI builds

inputs:
  apple_certificate:
    description: Base64-encoded .p12 certificate
    required: true
  apple_certificate_password:
    description: Password for the .p12 certificate
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Import signing certificate
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ inputs.apple_certificate }}
        APPLE_CERTIFICATE_PASSWORD: ${{ inputs.apple_certificate_password }}
      run: |
        set -euo pipefail

        if [ -z "$APPLE_CERTIFICATE" ]; then
          echo "❌ APPLE_CERTIFICATE secret is not set."
          echo "   GitHub releases must be signed and notarized. See SIGNING.md for setup."
          exit 1
        fi

        KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
        KEYCHAIN_PASSWORD=""

        echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

        security import "$RUNNER_TEMP/certificate.p12" \
          -k "$KEYCHAIN_PATH" \
          -P "$APPLE_CERTIFICATE_PASSWORD" \
          -A \
          -T /usr/bin/codesign \
          -T /usr/bin/security \
          -T /usr/bin/productbuild \
          -T /usr/bin/productsign

        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "Available signing identities:"
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"
